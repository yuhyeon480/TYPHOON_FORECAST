name: 태풍 알림 체크

on:
  schedule:
    # 10분마다 실행 (UTC 기준 cron). GitHub 정책상 시스템 부하가 높으면 몇 분 지연될 수 있음.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # Actions 탭에서 수동 실행 버튼도 쓸 수 있게

permissions:
  contents: write   # 상태 파일(typhoon_state.json)을 저장소에 커밋하기 위해 필요

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 태풍 정보 확인 및 알림 발송
        env:
          KMA_AUTH_KEY: ${{ secrets.KMA_AUTH_KEY }}
          VAPID_PRIVATE_KEY_PEM: ${{ secrets.VAPID_PRIVATE_KEY_PEM }}
          PUSH_SUBSCRIPTION_JSON: ${{ secrets.PUSH_SUBSCRIPTION_JSON }}
          VAPID_CLAIMS_EMAIL: ${{ secrets.VAPID_CLAIMS_EMAIL }}
          FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
          FCM_TOPIC: ${{ secrets.FCM_TOPIC }}
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
        run: python run_once.py

      - name: 상태 파일 변경사항 커밋
        run: |
          git config user.name "typhoon-bot"
          git config user.email "actions@users.noreply.github.com"
          git add typhoon_state.json last_run.json
          git diff --cached --quiet || git commit -m "상태 업데이트 $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
